<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Hobby Buddy Hub</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <!-- Global Styles -->
    <link rel="stylesheet" href="/public/css/global.css">
    <!-- Components Styles -->
    <link rel="stylesheet" href="/src/styles/components.css">
    <!-- Page Styles -->
    <link rel="stylesheet" href="/src/styles/pages/dashboard.css">
</head>
<body>
    <header id="header-container"></header>
    
    <main class="min-vh-100">
        <div class="container-fluid py-4">
            <div class="row mb-4">
                <div class="col-lg-12">
                    <h1 class="fw-bold mb-2">
                        <i class="bi bi-speedometer2 me-2"></i>Dashboard
                    </h1>
                    <p class="text-muted">Welcome back! Here's an overview of your hobby activities.</p>
                </div>
            </div>

            <!-- Stats Cards -->
            <div class="row g-4 mb-4">
                <div class="col-md-3 col-sm-6">
                    <div class="card border-0 shadow-sm h-100">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-start">
                                <div>
                                    <h6 class="text-muted text-uppercase small fw-bold">My Hobbies</h6>
                                    <h2 class="fw-bold mb-0" id="dashboardHobbiesCount">0</h2>
                                </div>
                                <i class="bi bi-star-fill text-warning" style="font-size: 2rem;"></i>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-md-3 col-sm-6">
                    <div class="card border-0 shadow-sm h-100 stat-card" id="eventsJoinedCard" style="cursor: pointer;" data-filter="joined">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-start">
                                <div>
                                    <h6 class="text-muted text-uppercase small fw-bold">Events Joined</h6>
                                    <h2 class="fw-bold mb-0" id="dashboardEventsJoinedCount">0</h2>
                                </div>
                                <i class="bi bi-calendar-check text-success" style="font-size: 2rem;"></i>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-md-3 col-sm-6">
                    <div class="card border-0 shadow-sm h-100 stat-card" id="myEventsCard" style="cursor: pointer;" data-filter="hosting">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-start">
                                <div>
                                    <h6 class="text-muted text-uppercase small fw-bold">My Events</h6>
                                    <h2 class="fw-bold mb-0" id="dashboardMyEventsCount">0</h2>
                                </div>
                                <i class="bi bi-megaphone text-primary" style="font-size: 2rem;"></i>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-md-3 col-sm-6">
                    <div class="card border-0 shadow-sm h-100">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-start">
                                <div>
                                    <h6 class="text-muted text-uppercase small fw-bold">Connections</h6>
                                    <h2 class="fw-bold mb-0" id="dashboardConnectionsCount">0</h2>
                                </div>
                                <i class="bi bi-people-fill text-info" style="font-size: 2rem;"></i>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="row g-4">
                <!-- Upcoming Events -->
                <div class="col-lg-8">
                    <div class="card border-0 shadow-sm mb-4">
                        <div class="card-header bg-white border-bottom">
                            <h5 class="mb-0 fw-bold">
                                <i class="bi bi-calendar3 me-2"></i>Upcoming Events
                            </h5>
                        </div>
                        <div class="card-body">
                            <div class="events-list-container" id="upcomingEventsContainer" style="max-height: 600px; overflow-y: auto;">
                                <p class="text-muted">Loading upcoming events...</p>
                            </div>
                        </div>
                        <div class="card-footer bg-white border-top text-center" id="loadMoreContainer" style="display: none;">
                            <button type="button" class="btn btn-sm btn-outline-primary" id="loadMoreBtn">
                                <i class="bi bi-arrow-down me-1"></i>Load More Events
                            </button>
                        </div>
                        <div class="card-footer bg-white border-top">
                            <a href="/events" class="btn btn-sm btn-outline-primary">
                                <i class="bi bi-arrow-right me-1"></i>View All Events
                            </a>
                        </div>
                    </div>
                </div>

                <!-- Quick Actions -->
                <div class="col-lg-4">
                    <div class="card border-0 shadow-sm mb-4">
                        <div class="card-header bg-white border-bottom">
                            <h5 class="mb-0 fw-bold">Quick Actions</h5>
                        </div>
                        <div class="card-body">
                            <div class="d-grid gap-2">
                                <a href="/create-event" class="btn btn-primary btn-sm">
                                    <i class="bi bi-plus-circle me-2"></i>Create Event
                                </a>
                                <a href="/hobbies" class="btn btn-outline-primary btn-sm">
                                    <i class="bi bi-star me-2"></i>Browse Hobbies
                                </a>
                                <a href="/people" class="btn btn-outline-primary btn-sm">
                                    <i class="bi bi-people me-2"></i>Find People
                                </a>
                                <a href="/profile" class="btn btn-outline-primary btn-sm">
                                    <i class="bi bi-person me-2"></i>My Profile
                                </a>
                            </div>
                        </div>
                    </div>

                    <!-- Featured Hobbies -->
                    <div class="card border-0 shadow-sm">
                        <div class="card-header bg-white border-bottom">
                            <h5 class="mb-0 fw-bold">My Hobbies</h5>
                        </div>
                        <div class="card-body">
                            <div id="dashboardHobbiesContainer" class="d-flex flex-wrap gap-2">
                                <p class="text-muted">Loading hobbies...</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    
    <footer id="footer-container"></footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Global JS -->
    <script type="module" src="/public/js/global.js"></script>
    <!-- Page JS with Module Support -->
    <script type="module" src="/src/pages/dashboard.js"></script>
</body>
</html>
