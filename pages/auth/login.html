<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Hobby Buddy Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <link href="../../public/css/global.css" rel="stylesheet">
    <link href="/src/styles/pages/auth/login.css" rel="stylesheet">
</head>
<body>
    <header id="header-container"></header>
    
    <div class="login-container">
        <div class="login-card">
            <h1>Welcome Back</h1>
            <p>Sign in to your account</p>
            
            <div id="alertContainer"></div>
            
            <form id="loginForm" method="post" action="/login" autocomplete="on">
                <div class="form-group">
                    <label for="email" class="form-label">Email Address</label>
                    <input 
                        type="email" 
                        class="form-control" 
                        id="email" 
                        name="email" 
                        autocomplete="username"
                        placeholder="Enter your email"
                        required
                    >
                </div>
                
                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <input 
                        type="password" 
                        class="form-control" 
                        id="password" 
                        name="password" 
                        autocomplete="current-password"
                        placeholder="Enter your password"
                        required
                    >
                </div>
                
                <button type="submit" class="btn-login" id="submitBtn">
                    <span class="loading-spinner" id="spinner"></span>
                    Sign In
                </button>
            </form>
            
            <div class="signup-link">
                Don't have an account? <a href="/register">Sign up here</a>
            </div>
        </div>
    </div>
    
    <footer id="footer-container"></footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Global JS -->
    <script type="module" src="/public/js/global.js"></script>
    <!-- Global Components Loader -->
    <script type="module">
        import ComponentsLoader from '/src/components/loader.js';
    </script>
    <script type="module" src="/src/pages/auth/login.js"></script>
</body>
</html>
