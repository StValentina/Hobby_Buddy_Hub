<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Hobby Buddy Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <link href="../../public/css/global.css" rel="stylesheet">
    <link href="/src/styles/pages/auth/register.css" rel="stylesheet">
</head>
<body>
    <header id="header-container"></header>
    
    <div class="register-container">
        <div class="register-card">
            <h1>Create Account</h1>
            <p>Join Hobby Buddy Hub today</p>
            
            <div id="alertContainer"></div>
            
            <form id="registerForm">
                <div class="form-group">
                    <label for="fullName" class="form-label">Full Name</label>
                    <input 
                        type="text" 
                        class="form-control" 
                        id="fullName" 
                        name="fullName" 
                        placeholder="Enter your full name"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="email" class="form-label">Email Address</label>
                    <input 
                        type="email" 
                        class="form-control" 
                        id="email" 
                        name="email" 
                        placeholder="Enter your email"
                        required
                    >
                </div>
                
                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <input 
                        type="password" 
                        class="form-control" 
                        id="password" 
                        name="password" 
                        placeholder="Create a strong password"
                        required
                    >
                    <div class="password-requirements" id="passwordReqs">
                        <ul>
                            <li id="req-length"><span class="requirement-unmet">●</span> At least 8 characters</li>
                            <li id="req-uppercase"><span class="requirement-unmet">●</span> At least 1 uppercase letter</li>
                            <li id="req-lowercase"><span class="requirement-unmet">●</span> At least 1 lowercase letter</li>
                            <li id="req-number"><span class="requirement-unmet">●</span> At least 1 number</li>
                        </ul>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="confirmPassword" class="form-label">Confirm Password</label>
                    <input 
                        type="password" 
                        class="form-control" 
                        id="confirmPassword" 
                        name="confirmPassword" 
                        placeholder="Confirm your password"
                        required
                    >
                </div>
                
                <button type="submit" class="btn-register" id="submitBtn">
                    <span class="loading-spinner" id="spinner"></span>
                    Create Account
                </button>
            </form>
            
            <div class="login-link">
                Already have an account? <a href="/login">Sign in here</a>
            </div>
        </div>
    </div>
    
    <footer id="footer-container"></footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Global JS -->
    <script type="module" src="/public/js/global.js"></script>
    <!-- Global Components Loader -->
    <script type="module">
        import ComponentsLoader from '/src/components/loader.js';
    </script>
    <script type="module" src="/src/pages/auth/register.js"></script>
</body>
</html>
