<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Details - Hobby Buddy Hub</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <!-- Global CSS -->
    <link rel="stylesheet" href="/public/css/global.css">
    <!-- Components CSS -->
    <link rel="stylesheet" href="/src/styles/components.css">
    
    <!-- Page CSS -->
    <link rel="stylesheet" href="/src/styles/pages/event-details.css">
</head>
<body>
    <!-- Header will be auto-loaded here -->
    <header id="header-container"></header>

    <main class="event-details-main">
        <!-- Hero Section with Event Image -->
        <div class="event-hero" id="eventHero">
            <div class="event-hero-content">
                <div class="event-badge" id="eventBadge"></div>
                <h1 id="eventTitle" class="event-title"></h1>
            </div>
        </div>

        <!-- Event Content -->
        <div class="container event-content">
            <div class="row">
                <!-- Main Content -->
                <div class="col-lg-8">
                    <!-- Description -->
                    <section class="event-section">
                        <h2 class="section-title">About This Event</h2>
                        <p id="eventDescription" class="event-description"></p>
                    </section>

                    <!-- Event Details Grid -->
                    <section class="event-section">
                        <h2 class="section-title">Event Details</h2>
                        <div class="details-grid">
                            <!-- Location -->
                            <div class="detail-item">
                                <div class="detail-icon">
                                    <i class="bi bi-geo-alt-fill"></i>
                                </div>
                                <div class="detail-content">
                                    <h4>Location</h4>
                                    <p id="eventLocation"></p>
                                </div>
                            </div>

                            <!-- Date -->
                            <div class="detail-item">
                                <div class="detail-icon">
                                    <i class="bi bi-calendar-event"></i>
                                </div>
                                <div class="detail-content">
                                    <h4>Date</h4>
                                    <p id="eventDate"></p>
                                </div>
                            </div>

                            <!-- Time -->
                            <div class="detail-item">
                                <div class="detail-icon">
                                    <i class="bi bi-clock"></i>
                                </div>
                                <div class="detail-content">
                                    <h4>Time</h4>
                                    <p id="eventTime"></p>
                                </div>
                            </div>

                            <!-- Host -->
                            <div class="detail-item">
                                <div class="detail-icon">
                                    <i class="bi bi-person-circle"></i>
                                </div>
                                <div class="detail-content">
                                    <h4>Host</h4>
                                    <p id="eventHost"></p>
                                </div>
                            </div>

                            <!-- Spots Available -->
                            <div class="detail-item">
                                <div class="detail-icon">
                                    <i class="bi bi-people-fill"></i>
                                </div>
                                <div class="detail-content">
                                    <h4>Spots Available</h4>
                                    <p id="eventSpots"></p>
                                </div>
                            </div>

                            <!-- Participants Info -->
                            <div class="detail-item">
                                <div class="detail-icon">
                                    <i class="bi bi-check-circle"></i>
                                </div>
                                <div class="detail-content">
                                    <h4>Current Participants</h4>
                                    <p id="eventParticipantsCount"></p>
                                </div>
                            </div>
                        </div>
                    </section>

                    <!-- Participants List -->
                    <section class="event-section">
                        <h2 class="section-title">Who's Attending</h2>
                        <div class="participants-list" id="participantsList"></div>
                    </section>
                </div>

                <!-- Sidebar -->
                <div class="col-lg-4">
                    <!-- Action Buttons -->
                    <div class="event-actions">
                        <button class="btn btn-lg btn-primary w-100 mb-3" id="joinBtn">
                            <i class="bi bi-plus-circle"></i> Join Event
                        </button>
                        <button class="btn btn-lg btn-outline-primary w-100 mb-3" id="interestedBtn">
                            <i class="bi bi-heart"></i> Interested
                        </button>
                        <a href="/pages/events.html" class="btn btn-lg btn-outline-secondary w-100">
                            <i class="bi bi-arrow-left"></i> Back to Events
                        </a>
                    </div>

                    <!-- Event Summary Card -->
                    <div class="event-summary-card">
                        <div class="summary-item">
                            <span class="summary-label">Category</span>
                            <span class="summary-value" id="summaryCategory"></span>
                        </div>
                        <div class="summary-item">
                            <span class="summary-label">Difficulty</span>
                            <span class="summary-value" id="summaryDifficulty"></span>
                        </div>
                        <div class="summary-item">
                            <span class="summary-label">Price</span>
                            <span class="summary-value" id="summaryPrice"></span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer will be auto-loaded here -->
    <footer id="footer-container"></footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Global JS -->
    <script type="module" src="/public/js/global.js"></script>
    
    <!-- Global Components Loader -->
    <script type="module">
        import ComponentsLoader from '/src/components/loader.js';
    </script>
    
    <!-- Page JS with Module Support -->
    <script type="module" src="/src/pages/event-details.js"></script>
</body>
</html>
