<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hobbies - Hobby Buddy Hub</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <!-- Global Styles -->
    <link rel="stylesheet" href="/public/css/global.css">
    <!-- Page Styles -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header id="header-container"></header>
    
    <main class="min-vh-100">
        <!-- Page Header -->
        <section class="page-header bg-light py-5">
            <div class="container text-center">
                <h1 class="display-4 fw-bold mb-2">Explore Hobbies</h1>
                <p class="lead text-muted">Discover hobbies that match your interests and connect with enthusiasts</p>
            </div>
        </section>

        <!-- Hobbies Grid -->
        <section class="py-5">
            <div class="container">
                <div class="row g-4" id="hobbiesGrid">
                    <!-- Hobby cards will be inserted here by JavaScript -->
                </div>
            </div>
        </section>
    </main>
    
    <footer id="footer-container"></footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Global JS -->
    <script src="/public/js/global.js"></script>
    <!-- Page JS -->
    <script src="script.js"></script>
</body>
</html>
