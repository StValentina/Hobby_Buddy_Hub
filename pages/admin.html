<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Hobby Buddy Hub</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <!-- Global Styles -->
    <link rel="stylesheet" href="/public/css/global.css">
    <!-- Components Styles -->
    <link rel="stylesheet" href="/src/styles/components.css">
    <!-- Page Styles -->
    <link rel="stylesheet" href="/src/styles/pages/admin.css">
</head>
<body>
    <header id="header-container"></header>

    <main class="min-vh-100 py-4">
        <div class="container">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h1 class="fw-bold mb-1"><i class="bi bi-shield-lock me-2"></i>Admin Panel</h1>
                    <p class="text-muted mb-0">Manage user roles (seeker, host, admin)</p>
                </div>
            </div>

            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white border-bottom">
                    <strong>Users and Roles</strong>
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table align-middle table-hover">
                            <thead>
                                <tr>
                                    <th>Name</th>
                                    <th>Email</th>
                                    <th>Current Role</th>
                                    <th>Change Role</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody id="adminUsersTbody">
                                <tr>
                                    <td colspan="5" class="text-muted py-4">Loading users...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer id="footer-container"></footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Global JS -->
    <script type="module" src="/public/js/global.js"></script>
    <!-- Global Components Loader -->
    <script type="module">
        import ComponentsLoader from '/src/components/loader.js';
    </script>
    <!-- Page JS -->
    <script type="module" src="/src/pages/admin.js"></script>
</body>
</html>
