<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Connections - Hobby Buddy Hub</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <!-- Global CSS -->
    <link rel="stylesheet" href="/public/css/global.css">
    <!-- Components CSS -->
    <link rel="stylesheet" href="/src/styles/components.css">
    
    <!-- Page CSS -->
    <link rel="stylesheet" href="/src/styles/pages/my-connections.css">
</head>
<body>
    <!-- Header will be auto-loaded here -->
    <header id="header-container"></header>

    <main class="my-connections-main">
        <div class="container py-5">
            <!-- Page Title -->
            <div class="row mb-5">
                <div class="col-lg-12 text-center">
                    <h1 class="display-4 fw-bold text-dark">My Connections</h1>
                    <p class="lead text-muted">People you're connected with</p>
                </div>
            </div>

            <!-- Connections Grid -->
            <div class="row g-4">
                <div class="col-lg-12">
                    <div id="connectionsContainer">
                        <div class="text-center text-muted py-5">
                            <i class="bi bi-hourglass-split" style="font-size: 3rem;"></i>
                            <p class="mt-3">Loading connections...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer will be auto-loaded here -->
    <footer id="footer-container"></footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Global JS -->
    <script type="module" src="/public/js/global.js"></script>
    
    <!-- Page JS with Module Support -->
    <script type="module" src="/src/pages/my-connections.js"></script>
</body>
</html>
