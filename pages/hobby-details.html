<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hobby Details - Hobby Buddy Hub</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <!-- Global CSS -->
    <link rel="stylesheet" href="/public/css/global.css">
    <!-- Components CSS -->
    <link rel="stylesheet" href="/src/styles/components.css">
    
    <!-- Page CSS -->
    <link rel="stylesheet" href="/src/styles/pages/hobby-details.css">
</head>
<body>
    <!-- Header will be auto-loaded here -->
    <header id="header-container"></header>

    <main class="hobby-details-main">
        <!-- Hero Section -->
        <div class="hobby-hero" id="hobbyHero">
            <div class="hobby-hero-content">
                <span class="hobby-icon" id="hobbyIcon"></span>
                <h1 id="hobbyTitle" class="hobby-title"></h1>
            </div>
        </div>

        <!-- Content -->
        <div class="container hobby-content">
            <div class="row">
                <!-- Main Content -->
                <div class="col-lg-8">
                    <!-- Description Section -->
                    <section class="hobby-section">
                        <h2 class="section-title">About This Hobby</h2>
                        <p id="hobbyDescription" class="hobby-description"></p>
                    </section>

                    <!-- Tags Section -->
                    <section class="hobby-section">
                        <h2 class="section-title">Tags</h2>
                        <div class="tags-container" id="tagsList"></div>
                    </section>

                    <!-- Upcoming Events -->
                    <section class="hobby-section">
                        <h2 class="section-title">Upcoming Events</h2>
                        <div class="events-list" id="eventsList"></div>
                    </section>

                    <!-- People Interested -->
                    <section class="hobby-section">
                        <h2 class="section-title">People Interested in This Hobby</h2>
                        <div class="people-grid" id="peopleList"></div>
                    </section>
                </div>

                <!-- Sidebar -->
                <div class="col-lg-4">
                    <!-- Hobby Stats Card -->
                    <div class="hobby-info-card">
                        <h3 class="info-card-title">Hobby Stats</h3>

                        <div class="info-item">
                            <span class="info-label">Interested People</span>
                            <span class="info-value" id="interestedCount"></span>
                        </div>

                        <div class="info-item">
                            <span class="info-label">Active Events</span>
                            <span class="info-value" id="activeEventsCount"></span>
                        </div>

                        <button class="btn btn-lg btn-primary w-100 mt-4" id="joinHobbyBtn">
                            <i class="bi bi-plus-circle me-2"></i>Join Hobby
                        </button>
                    </div>

                    <!-- Related Hobbies -->
                    <div class="hobby-info-card">
                        <h3 class="info-card-title">Related Hobbies</h3>
                        <div class="related-hobbies" id="relatedHobbies"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer will be auto-loaded here -->
    <footer id="footer-container"></footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Global JS -->
    <script type="module" src="/public/js/global.js"></script>
    
    <!-- Page JS -->
    <script type="module" src="/src/pages/hobby-details.js"></script>
</body>
</html>
